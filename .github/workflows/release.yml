name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Persist the release PAT so @semantic-release/git can push the
          # chore(release) commit to protected main. The PAT must belong to a
          # user in main's branch-protection bypass list; the default
          # GITHUB_TOKEN cannot bypass the required-PR rule. Falls back to
          # GITHUB_TOKEN only so non-release CI still checks out.
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) + provenance needs npm >= 11.5.1;
      # Node 22 ships npm 10. No NPM_TOKEN: auth is tokenless via the
      # id-token: write permission above plus the trusted-publisher entry
      # registered for yadflow on npmjs.com.
      - name: Upgrade npm (trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Semantic Release
        env:
          # Release PAT (bypasses branch protection) so @semantic-release/git
          # can commit CHANGELOG.md + package.json back to main. Also used by
          # @semantic-release/github for the release/tag. npm publish stays
          # tokenless via OIDC (id-token: write), independent of this token.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
