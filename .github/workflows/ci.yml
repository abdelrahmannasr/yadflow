name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [18, 20, 22]
        # One macOS leg (Node 22) confirms the bash gates + git plumbing behave on the
        # other POSIX target without paying for a full os×node cross-product.
        include:
          - os: macos-latest
            node-version: 22
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      # Bug net, not a style check (no formatter) — runs once on the canonical leg.
      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run lint

      - name: Test
        run: npm test

      # Threshold flags need Node >= 22.8 — gate on the 22 leg only. Floors, not targets:
      # raise them as coverage grows, never lower them to make a change pass.
      - name: Coverage gate (lines >= 70%, branches >= 70%)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run coverage

      - name: Pack smoke (tarball contents)
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: |
          files=$(npm pack --dry-run --json | node -e "const f=JSON.parse(require('fs').readFileSync(0)).flatMap(x=>x.files.map(y=>y.path)); console.log(f.join('\n'))")
          echo "$files"
          for leak in .sdlc/ demo-repos/ epics/ cli/test.mjs cli/test-checks.mjs; do
            # Escape regex metachars so the prefix match is literal (".sdlc/" must not match "asdlc/").
            if echo "$files" | grep -q "^${leak//./\\.}"; then echo "::error::tarball leaks $leak"; exit 1; fi
          done
          echo "$files" | grep -q '^bin/yad.mjs' || { echo "::error::bin missing"; exit 1; }
          echo "$files" | grep -q '^skills/' || { echo "::error::skills missing"; exit 1; }

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      # Packs the real tarball, installs it into a throwaway prefix, and drives the installed
      # binary through setup -> check -> gate open/sync -> commit -> check gates (pass + fail).
      - name: E2E against the packed tarball
        run: npm run test:e2e

  audit:
    name: audit (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # The runtime has ZERO production dependencies — this proves it stays that way.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify registry signatures
        run: npm audit signatures
