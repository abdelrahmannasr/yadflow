name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack smoke (tarball contents)
        if: matrix.node-version == 22
        run: |
          files=$(npm pack --dry-run --json | node -e "const f=JSON.parse(require('fs').readFileSync(0)).flatMap(x=>x.files.map(y=>y.path)); console.log(f.join('\n'))")
          echo "$files"
          for leak in .sdlc/ demo-repos/ epics/ cli/test.mjs cli/test-checks.mjs; do
            if echo "$files" | grep -q "^$leak"; then echo "::error::tarball leaks $leak"; exit 1; fi
          done
          echo "$files" | grep -q '^bin/yad.mjs' || { echo "::error::bin missing"; exit 1; }
          echo "$files" | grep -q '^skills/' || { echo "::error::skills missing"; exit 1; }

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Packs the real tarball, installs it into a throwaway prefix, and drives the installed
      # binary through setup -> check -> gate open/sync -> commit -> check gates (pass + fail).
      - name: E2E against the packed tarball
        run: npm run test:e2e
