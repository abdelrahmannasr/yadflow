# yad-managed — built by `yad docs sync --wire`. Edit the skill, not this file.
name: yad-docs
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: yad-docs-pages
  cancel-in-progress: true
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build the overview site
        run: |
          if [ -d docs/sdlc-site ]; then
            cd docs/sdlc-site && npm ci && npm run build
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sdlc-site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
