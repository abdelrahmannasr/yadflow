# yad-managed: yad-hub-bridge
# Event-driven gate sync for the PRODUCT HUB. CI is the SOLE writer of the ledger; humans never
# commit gate-state files (enforced by the ledger-guard check). Two phases:
#
#   PRE-MERGE (review submitted/dismissed, PR opened/reopened/synchronize): check out the REVIEW
#   branch and run `yad gate ci --branch <head> --pr <n>`. The artifact + ledger live together on
#   that branch, so no overlay is needed; CI writes the ledger back to the SAME review branch. The
#   commit carries [skip ci] so the push does not re-fire `synchronize` (loop guard).
#
#   MERGE (PR closed + merged): check out the default branch (the merge already landed the branch
#   ledger + artifact here) and run `yad gate ci … --merged`, which advances the step and flips the
#   artifact status on the default branch.
#
# CI never approves and never merges — the merge click is the human approval act.
#
# Protected default branch? ONLY the merge job pushes there now (pre-merge pushes go to the
# unprotected review branch). If the default branch is protected against Actions:
#   a) add a ruleset bypass so GitHub Actions may push to it, or
#   b) store a fine-grained PAT as the SDLC_GATE_TOKEN secret and pass it to actions/checkout in the
#      mergesync job via `with: { token: ${{ secrets.SDLC_GATE_TOKEN }} }` — see references/bridge.md.
# Recommended: enable "Dismiss stale pull request approvals when new commits are pushed" so an
# approval is dropped by the platform when the artifact changes (revoke-on-change stays robust even
# if a force-push wipes CI's approvals.json, which CI then rebuilds).
name: yad-gate-sync
on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write # push the ledger commit (review branch pre-merge; default branch on merge)
  pull-requests: read # gh pr view + reviewThreads GraphQL

jobs:
  presync:
    # Any pre-merge signal on a review branch — a review, or the PR being opened/updated. NOT a merge.
    if: >
      startsWith(github.event.pull_request.head.ref, 'review/EP-') &&
      github.event.pull_request.merged != true &&
      (github.event_name == 'pull_request_review' ||
       contains(fromJSON('["opened","reopened","synchronize"]'), github.event.action))
    runs-on: ubuntu-latest
    # Serialize per review branch so a PR's own runs never race; different PRs sync in parallel.
    concurrency:
      group: yad-gate-presync-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Check out the REVIEW branch itself — artifact + ledger live together, no overlay needed.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync the gate ledger onto the review branch
        run: |
          git config user.name  "yad-gate-sync[bot]"
          git config user.email "yad-gate-sync[bot]@users.noreply.github.com"
          npx -y -p yadflow@3 yad gate ci \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --pr "${{ github.event.pull_request.number }}"

  mergesync:
    # The human merge: advance the step + flip the artifact status on the default branch.
    if: >
      startsWith(github.event.pull_request.head.ref, 'review/EP-') &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    # Serialize every merge advance — they all push the default branch.
    concurrency:
      group: yad-gate-mergesync
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Check out the default branch — the merge already landed the branch ledger + artifact here.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Advance the gate on merge
        run: |
          git config user.name  "yad-gate-sync[bot]"
          git config user.email "yad-gate-sync[bot]@users.noreply.github.com"
          npx -y -p yadflow@3 yad gate ci \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --merged
