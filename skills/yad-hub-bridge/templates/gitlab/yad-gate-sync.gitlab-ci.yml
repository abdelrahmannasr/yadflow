# yad-managed-include: yad-hub-bridge
# Event-driven gate sync for the PRODUCT HUB, as an INCLUDABLE fragment. Pulled into the hub's
# root .gitlab-ci.yml via:
#   include:
#     - local: '.gitlab/ci/yad-gate-sync.yml'
# so wiring never edits the foreign root pipeline beyond that one include line. The job carries
# `needs: []` and no `stage:` (same merge-safety as the yad-checks fragment).
#
# CI is the SOLE writer of the ledger; humans never commit gate-state files (ledger-guard enforces
# it). Two phases:
#   PRE-MERGE (MR event — open / push to the review branch): check out the MR SOURCE (review) branch
#   and run `yad gate ci --branch <source> --pr <iid>`. Artifact + ledger live together there, so no
#   overlay; the ledger is written back to the review branch. The commit carries [skip ci] so the
#   push does not re-fire the MR pipeline (loop guard).
#   MERGE (push to the default branch whose commit names a review branch): check out the default
#   branch and run `yad gate ci --branch <review-branch> --merged` — advance + status flip there.
#
# GitLab is the DEGRADED path, stated honestly: GitLab fires no pipeline on an approval alone.
#   - MR events (open / push to the review branch) and the merge are picked up near-immediately.
#   - Approvals are only seen by the SCHEDULED sweep. Create a pipeline schedule (one-time, cannot
#     be committed as code): cron `*/15 * * * *` with variable SDLC_GATE_SYNC=true — so an approval
#     can take up to ~15 minutes to reach the ledger. UI: CI/CD > Schedules, or:
#       glab api projects/:id/pipeline_schedules -X POST \
#         -f description='yad gate sync' -f ref=main -f cron='*/15 * * * *'
#       glab api "projects/:id/pipeline_schedules/<id>/variables" -X POST \
#         -f key=SDLC_GATE_SYNC -f value=true
#
# Token: CI_JOB_TOKEN can neither read the approvals API nor push to a protected branch. Create a
# PROJECT ACCESS TOKEN with `read_api` + `write_repository` (role Developer+, allowed to push to the
# default branch — the merge phase pushes there; pre-merge pushes the unprotected review branch) and
# store it as a masked CI/CD variable SDLC_GATE_TOKEN. Without it the job fails visibly and manual
# `yad gate sync` remains the fallback. Recommended: enable "Remove all approvals when commits are
# added to the source branch" so revoke-on-change stays robust across a force-push.
variables:
  GIT_DEPTH: "0" # full history: gate ci pushes the ledger to the review / default branch

yad-gate-sync:
  needs: []
  # Runner selection: set the YAD_RUNNER_TAGS CI/CD variable (e.g. `dind_runner`) to route this
  # docker job on instances whose runners are tag-locked (run_untagged: false) — it lives in
  # project Settings → CI/CD → Variables, so it survives every `yad` sync. When unset, current
  # GitLab (>=15) runs the job untagged; older versions may strand it — set a real tag if so.
  tags: [$YAD_RUNNER_TAGS]
  image: node:20
  rules:
    # MR-event path: fires on MR open / push to the review branch — NOT on approval (see header).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^review\/EP-/
    # Merge path: branch pipeline on the default branch whose merge commit names a review branch.
    # Squash/fast-forward merges may omit the branch name — those advance on the next scheduled sweep.
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE =~ /review\/EP-/
    # Scheduled sweep: the only path that picks up approvals (advances + flips status on a merge it sees).
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SDLC_GATE_SYNC == "true"
  script:
    # Pinned glab binary (node:20 has no glab). Alternative: image registry.gitlab.com/gitlab-org/cli.
    - GLAB_VERSION=1.55.0
    - curl -fsSL "https://gitlab.com/gitlab-org/cli/-/releases/v${GLAB_VERSION}/downloads/glab_${GLAB_VERSION}_linux_amd64.deb" -o /tmp/glab.deb && dpkg -i /tmp/glab.deb
    - git config user.name "yad-gate-sync" && git config user.email "yad-gate-sync@noreply.${CI_SERVER_HOST}"
    - git remote set-url origin "https://oauth2:${SDLC_GATE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - export GITLAB_TOKEN="$SDLC_GATE_TOKEN" GITLAB_HOST="$CI_SERVER_URL"
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        # PRE-MERGE: write the ledger onto the MR source (review) branch — artifact + ledger together.
        git fetch origin "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        git checkout -B "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" "origin/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
        npx -y -p yadflow@3 yad gate ci --branch "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" --pr "$CI_MERGE_REQUEST_IID"
      elif [ "$CI_PIPELINE_SOURCE" = "schedule" ]; then
        # SCHEDULED SWEEP — GitLab fires no pipeline on a bare approval, so this is the catch-up path.
        # (a) Default-branch sweep: advance any merged-but-stuck review (e.g. a squash merge whose
        #     message dropped the branch name) — its ledger already reached the default branch.
        git fetch origin "$CI_DEFAULT_BRANCH"
        git checkout -B "$CI_DEFAULT_BRANCH" "origin/$CI_DEFAULT_BRANCH"
        npx -y -p yadflow@3 yad gate ci || true
        # (b) Per-branch sweep: in-flight reviews keep their ledger ON the review branch, so enumerate
        #     the open review branches and sync each (the PR number is read from the branch ledger).
        for ref in $(git ls-remote --heads origin 'refs/heads/review/EP-*' | awk '{print $2}' | sed 's#refs/heads/##'); do
          git fetch -q origin "$ref" && git checkout -q -B "$ref" "origin/$ref" || continue
          npx -y -p yadflow@3 yad gate ci --branch "$ref" || true
        done
      else
        # MERGE push to the default branch whose commit names a review branch: advance there.
        git fetch origin "$CI_DEFAULT_BRANCH"
        git checkout -B "$CI_DEFAULT_BRANCH" "origin/$CI_DEFAULT_BRANCH"
        REVIEW_BRANCH="$(printf '%s' "$CI_COMMIT_MESSAGE" | grep -oE 'review/EP-[A-Za-z0-9._/-]+' | head -n1 || true)"
        if [ -n "$REVIEW_BRANCH" ]; then
          npx -y -p yadflow@3 yad gate ci --branch "$REVIEW_BRANCH" --merged
        else
          npx -y -p yadflow@3 yad gate ci   # fallback sweep on the default branch
        fi
      fi
